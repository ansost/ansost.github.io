name: Build & deploy live site

on:
  push:
    branches:
     - master
#   schedule:
#     # Run on the hour
#     - cron: '0 * * * *'

jobs:
  build-deploy:
    runs-on: ubuntu-18.04
    steps:
    - uses: actions/checkout@v1                  

    - name: Install Ruby Dev                     
      run: sudo apt-get install ruby-dev

    - name: Install AsciiDoctor and Rouge
      run: sudo gem install asciidoctor rouge

    - name: Setup Hugo                           
      uses: peaceiris/actions-hugo@v2
      with:
        hugo-version: '0.85.0'

    - name: Build                                
      run: hugo mod get -u && hugo

    - name: Deploy                               
      uses: peaceiris/actions-gh-pages@v3
      with:
        deploy_key: ${{ secrets.ACTION_DEPLOY_KEY }}
        external_repository: ansost/ansost.github.io
        publish_branch: master
        publish_dir: ./public

